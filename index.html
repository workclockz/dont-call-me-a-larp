<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CLICK ME IF YOU DARE..</title>
    <style>
        body {
            margin: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        button {
            background: red;
            color: white;
            border: none;
            padding: 25px 50px;
            font-size: 28px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
        }

        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<button id="downloadBtn">CLICK ME IF YOU DARE..</button>

<script>
document.getElementById("downloadBtn").addEventListener("click", () => {
    const link = document.createElement("a");
    link.href = "MyExtension.zip"; // change if your ZIP has a different name
    link.download = "MyExtension.zip";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
});
</script>

</body>
</html>
